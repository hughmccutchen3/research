<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 510" width="800" height="510">
<rect width="800" height="540" fill="#ffffff"/>
<style>
  text { font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 15px; font-weight: 700; fill: #1e293b; letter-spacing: 0.08em; }
  .sub   { font-size: 11px; font-weight: 400; fill: #94a3b8; }
  .label { font-size: 13px; font-weight: 600; fill: #1e293b; }
  .note  { font-size: 11px; font-weight: 400; fill: #64748b; }
  .ann-hd { font-size: 12px; font-weight: 700; fill: #1e293b; }
  .ann   { font-size: 11px; font-weight: 400; fill: #475569; }
  .dim   { fill: #94a3b8; }
</style>

<!-- Title -->
<text class="title" x="400" y="30" text-anchor="middle">RELATIVE STORAGE VOLUME BY LAYER</text>
<text class="sub"   x="400" y="48" text-anchor="middle">Illustrative — ratios vary by retention policy, promotion selectivity, and change event volume</text>

<!-- ROW 1: Fork / Landing -->
<text class="label" x="148" y="87"  text-anchor="end">Fork /</text>
<text class="label" x="148" y="103" text-anchor="end">Landing</text>
<rect x="156" y="72" width="28" height="26" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
<text class="note" x="192" y="85" dominant-baseline="central">Full payload ingestion point · transient · dropped after checkpoint</text>

<!-- ROW 2: Vault -->
<text class="label" x="148" y="143" text-anchor="end">Vault</text>
<rect x="156" y="120" width="456" height="26" rx="3" fill="#f1f0e8" stroke="#5f5e5a" stroke-width="1"/>
<text class="note" x="164" y="133" dominant-baseline="central">5–10 years as legally required · archive tier · lowest $/GB</text>
<!-- Zigzag break -->
<polygon points="612,120 630,120 621,128 630,146 612,146 621,128" fill="#ffffff" stroke="none"/>
<line x1="612" y1="120" x2="630" y2="120" stroke="#5f5e5a" stroke-width="1"/>
<line x1="612" y1="146" x2="630" y2="146" stroke="#5f5e5a" stroke-width="1"/>
<text class="note dim" x="636" y="133" dominant-baseline="central">→ years</text>

<!-- Tier divider -->
<line x1="156" y1="162" x2="720" y2="162" stroke="#cbd5e1" stroke-width="0.75" stroke-dasharray="5 3"/>
<text class="sub" x="156" y="177">Analytical store (medallion)</text>

<!-- ROW 3: Bronze -->
<text class="label" x="148" y="203" text-anchor="end">Bronze</text>
<rect x="156" y="186" width="160" height="26" rx="3" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
<text class="note" x="324" y="199" dominant-baseline="central">Load as needed. Hold max 2–3 years.</text>

<!-- ROW 4: Silver -->
<text class="label" x="148" y="253" text-anchor="end">Silver</text>
<rect x="156" y="236" width="200" height="26" rx="3" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
<text class="note" x="364" y="249" dominant-baseline="central">SCD2 with history · columnar · analytical consumption starts with Silver at the earliest</text>

<!-- ROW 5: Gold -->
<text class="label" x="148" y="303" text-anchor="end">Gold</text>
<rect x="156" y="286" width="40" height="26" rx="3" fill="#eaf3de" stroke="#3b6d11" stroke-width="1"/>
<text class="note" x="204" y="299" dominant-baseline="central">Governed products · drops when use case ends</text>

<!-- Annotation box: full width x=20 to x=780, width=760 -->
<!-- Lines 2 and 4 are long — wrapped with tspan -->
<!-- Height: header(22) + rule(8) + 4 lines(20ea) + 2 wraps(16ea) + rule(8) + footer(20) + padding(28) = ~178 -->
<rect x="20" y="338" width="760" height="152" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.75"/>
<text class="ann-hd" x="38" y="360">Four controls on analytical storage size:</text>
<line x1="20" y1="368" x2="780" y2="368" stroke="#cbd5e1" stroke-width="0.75"/>

<text class="ann" x="38" y="385">1. Bronze intake — only onboard source tables with a real analytical use case. Not every source table belongs in Bronze.</text>

<text class="ann" x="38" y="403">2. Promotion selectivity — decide what Bronze data is worth promoting.</text>
<text class="ann" x="50" y="419">Most Bronze never needs to become Silver.</text>

<text class="ann" x="38" y="437">3. Column selection (Silver and Gold) — drop source metadata and audit columns. Carry only what the use case requires.</text>

<text class="ann" x="38" y="455">4. Use case lifecycle — approved usage of Gold, Silver, and Bronze all cascade down to trim storage, processing, and risk.</text>
<text class="ann" x="50" y="471">When a use case ends, remove it at every layer.</text>


</svg>
