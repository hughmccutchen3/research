<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<rect width="800" height="500" fill="#ffffff"/>
<style>
  text { font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif; }
  .title   { font-size: 15px; font-weight: 700; fill: #1e293b; letter-spacing: 0.08em; }
  .sub     { font-size: 11px; font-weight: 400; fill: #64748b; }
  .hd      { font-size: 14px; font-weight: 700; fill: #ffffff; letter-spacing: 0.12em; }
  .ey1     { font-size: 9px; font-weight: 700; fill: #92744a; letter-spacing: 0.14em; }
  .ey2     { font-size: 9px; font-weight: 700; fill: #4a6f8a; letter-spacing: 0.14em; }
  .ey3     { font-size: 9px; font-weight: 700; fill: #3a5068; letter-spacing: 0.14em; }
  .body    { font-size: 11px; font-weight: 400; fill: #1e293b; }
</style>

<!-- Title -->
<text class="title" x="400" y="28" text-anchor="middle">THREE COMPLIANCE OBLIGATIONS — ACTING SIMULTANEOUSLY</text>
<text class="sub"   x="400" y="46" text-anchor="middle">All three apply to the same data at the same time. Meeting one does not excuse the others.</text>

<!--
  Card geometry:
  y=60 top, height=420, bottom=480
  Card 1: x=20  w=242
  Card 2: x=278 w=242
  Card 3: x=536 w=242
  Header band: y=60 h=40 (rounded top corners only via path)
  Body: y=100 h=380 rx=0 top, rx=6 bottom — achieved by full card rx=6 behind header
-->

<!-- ═══ CARD 1: RETAIN ═══ -->
<!-- Full card background (cream, rounded all corners) -->
<rect x="20" y="60" width="242" height="420" rx="6" fill="#fdf8ee" stroke="#b8952a" stroke-width="1"/>
<!-- Header band: rounded top only via path -->
<path d="M 26,60 Q 20,60 20,66 L 20,100 L 262,100 L 262,66 Q 262,60 256,60 Z" fill="#7a5c1e"/>
<text class="hd" x="141" y="86" text-anchor="middle" dominant-baseline="central">RETAIN</text>

<text class="ey1"  x="36" y="122">REGULATORY BASIS</text>
<text class="body" x="36" y="139">HIPAA · CMS · SOX · 42 CFR</text>
<text class="body" x="36" y="155">Part 2 · State statute · Contract</text>

<text class="ey1"  x="36" y="182">REQUIREMENT</text>
<text class="body" x="36" y="199">Record must be available, legible,</text>
<text class="body" x="36" y="215">and provably unaltered for the</text>
<text class="body" x="36" y="231">regulated retention period.</text>

<text class="ey1"  x="36" y="258">FAILURE MODE</text>
<text class="body" x="36" y="275">Audit finding · Fine ·</text>
<text class="body" x="36" y="291">Loss of operating license</text>

<text class="ey1"  x="36" y="318">CLOCK STARTS AT</text>
<text class="body" x="36" y="335">Creation · Last use · Event</text>

<!-- ═══ CARD 2: ERASE ═══ -->
<rect x="278" y="60" width="242" height="420" rx="6" fill="#f0f4f8" stroke="#2d5270" stroke-width="1"/>
<path d="M 284,60 Q 278,60 278,66 L 278,100 L 520,100 L 520,66 Q 520,60 514,60 Z" fill="#1e3a52"/>
<text class="hd" x="399" y="86" text-anchor="middle" dominant-baseline="central">ERASE</text>

<text class="ey2"  x="294" y="122">REGULATORY BASIS</text>
<text class="body" x="294" y="139">GDPR Art. 17 · CCPA · CPRA</text>
<text class="body" x="294" y="155">HIPAA right of access</text>

<text class="ey2"  x="294" y="182">REQUIREMENT</text>
<text class="body" x="294" y="199">When a subject revokes consent</text>
<text class="body" x="294" y="215">or exercises a right, identifying</text>
<text class="body" x="294" y="231">fields must be removed across</text>
<text class="body" x="294" y="247">all copies.</text>

<text class="ey2"  x="294" y="274">FAILURE MODE</text>
<text class="body" x="294" y="291">Regulatory action ·</text>
<text class="body" x="294" y="307">Privacy event · Reputation</text>

<text class="ey2"  x="294" y="334">PHYSICAL PURGE REQUIRED</text>
<text class="body" x="294" y="351">Hard mask + history clearing</text>

<!-- ═══ CARD 3: GOVERN ═══ -->
<rect x="536" y="60" width="242" height="420" rx="6" fill="#e8eef4" stroke="#1e3a52" stroke-width="1"/>
<path d="M 542,60 Q 536,60 536,66 L 536,100 L 778,100 L 778,66 Q 778,60 772,60 Z" fill="#0f2535"/>
<text class="hd" x="657" y="86" text-anchor="middle" dominant-baseline="central">GOVERN</text>

<text class="ey3"  x="552" y="122">REGULATORY BASIS</text>
<text class="body" x="552" y="139">SOX · COSO · ISACA COBIT</text>
<text class="body" x="552" y="155">HIPAA Privacy/Security Rules</text>

<text class="ey3"  x="552" y="182">REQUIREMENT</text>
<text class="body" x="552" y="199">Access controlled, logged,</text>
<text class="body" x="552" y="215">attested, and auditable for</text>
<text class="body" x="552" y="231">as long as the record exists,</text>
<text class="body" x="552" y="247">in any form.</text>

<text class="ey3"  x="552" y="274">FAILURE MODE</text>
<text class="body" x="552" y="291">Precursor to nearly every</text>
<text class="body" x="552" y="307">other failure mode</text>

<text class="ey3"  x="552" y="334">CONTINUOUS</text>
<text class="body" x="552" y="351">No clock — runs while record exists</text>

</svg>
