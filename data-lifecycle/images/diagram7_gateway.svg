<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280">
<rect width="860" height="280" fill="#ffffff" rx="4"/>
<style>text{font-family:Segoe UI,Arial,sans-serif}</style>

<text x="430" y="28" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">10-YEAR PATIENT DE-IDENTIFICATION GATEWAY (D-23)</text>
<text x="430" y="46" font-size="10" fill="#6b7280" text-anchor="middle">PLACEHOLDER — to be refined</text>

<!-- Timeline arrow -->
<line x1="60" y1="120" x2="800" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#ta)"/>
<defs><marker id="ta" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker></defs>

<!-- Year markers -->
<circle cx="120" cy="120" r="6" fill="#3b82f6"/><text x="120" y="105" font-size="9" fill="#374151" text-anchor="middle" font-weight="600">Year 0</text>
<text x="120" y="145" font-size="8" fill="#6b7280" text-anchor="middle">Ingest</text>

<circle cx="300" cy="120" r="6" fill="#3b82f6"/><text x="300" y="105" font-size="9" fill="#374151" text-anchor="middle" font-weight="600">Year 2-3</text>
<text x="300" y="145" font-size="8" fill="#6b7280" text-anchor="middle">Bronze DELETED</text>
<text x="300" y="157" font-size="8" fill="#6b7280" text-anchor="middle">(vault retains)</text>

<circle cx="500" cy="120" r="6" fill="#f59e0b"/><text x="500" y="105" font-size="9" fill="#374151" text-anchor="middle" font-weight="600">Year 7-9</text>
<text x="500" y="145" font-size="8" fill="#6b7280" text-anchor="middle">Silver/Gold tiered</text>
<text x="500" y="157" font-size="8" fill="#6b7280" text-anchor="middle">by usage</text>

<!-- The gateway -->
<rect x="620" y="80" width="140" height="80" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
<text x="690" y="105" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">YEAR 10</text>
<text x="690" y="120" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">GATEWAY</text>
<text x="690" y="140" font-size="8" fill="#991b1b" text-anchor="middle">Mandatory review</text>

<!-- Two outputs -->
<line x1="690" y1="160" x2="690" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="690" y1="190" x2="580" y2="210" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ga)"/>
<line x1="690" y1="190" x2="800" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ra)"/>

<defs>
<marker id="ga" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#16a34a"/></marker>
<marker id="ra" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#dc2626"/></marker>
</defs>

<rect x="490" y="210" width="180" height="40" rx="6" fill="#dcfce7" stroke="#16a34a"/>
<text x="580" y="228" font-size="9" font-weight="600" fill="#166534" text-anchor="middle">De-identify patient →</text>
<text x="580" y="242" font-size="9" fill="#166534" text-anchor="middle">Retain on business value</text>

<rect x="710" y="210" width="130" height="40" rx="6" fill="#fee2e2" stroke="#dc2626"/>
<text x="775" y="228" font-size="9" font-weight="600" fill="#991b1b" text-anchor="middle">No business value →</text>
<text x="775" y="242" font-size="9" fill="#991b1b" text-anchor="middle">Delete</text>

<!-- Note about what survives -->
<text x="430" y="272" font-size="9" fill="#6b7280" text-anchor="middle">Patient identity removed · Physician / Facility / Payer identity RETAINED · Business events preserved</text>
</svg>