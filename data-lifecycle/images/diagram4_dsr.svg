<text x="152" y="470" font-size="10" fill="#1e293b" text-anchor="start">REORG TABLE APPLY (PURGE) → Set retention=0hrs → VACUUM table</text>
<text x="152" y="486" font-size="9" fill="#6b7280" text-anchor="start">Restore retention=7 days — Pre-overwrite values permanently removed</text>
<line x1="460" y1="500" x2="460" y2="516" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#da)"/>

<rect x="80" y="518" width="760" height="68" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
