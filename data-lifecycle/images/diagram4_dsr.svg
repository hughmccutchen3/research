<text x="152" y="278" font-size="12" font-weight="700" fill="#dc2626" text-anchor="start">OVERWRITE</text>
<text x="152" y="294" font-size="10" fill="#1e293b" text-anchor="start">UPDATE identity columns at EACH layer independently (Bronze, Silver, Gold)</text>
