<text x="152" y="540" font-size="12" font-weight="700" fill="#16a34a" text-anchor="start">CLEANUP &amp; EVIDENCE</text>
<text x="152" y="556" font-size="10" fill="#1e293b" text-anchor="start">Restart clusters (clear cache) · Force refresh materialized views</text>
<text x="152" y="572" font-size="9" fill="#6b7280" text-anchor="start">skipChangeCommits on DLT · Vault: delete identity mapping · Log to erasure_audit table</text>

