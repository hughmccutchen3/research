<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640">
<rect width="920" height="640" fill="#ffffff" rx="4"/>
<style>text{font-family:Segoe UI,Arial,sans-serif}</style>

<text x="460" y="24" font-size="11" font-weight="700" fill="#0369a1" text-anchor="middle">STREAM 2 — ANALYTICAL LAKE — Telemetry-Driven Lifecycle (Disposable)</text>
<text x="460" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">Transitions based on system.access.audit · Lifecycle gates required · Endpoint is DELETE, not archive</text>

<rect x="20" y="52" width="880" height="68" rx="8" fill="#fef2f2" stroke="#dc2626"/>
<rect x="35" y="64" width="85" height="26" rx="13" fill="#dc2626"/><text x="77" y="82" font-size="12" font-weight="700" fill="white" text-anchor="middle">HOT</text>
<text x="140" y="76" font-size="11" font-weight="700" fill="#1e293b" text-anchor="start">0-30 days</text>
<text x="300" y="68" font-size="8" fill="#94a3b8" text-anchor="start">Cost/GB/mo</text><text x="300" y="86" font-size="15" font-weight="700" fill="#dc2626" font-family="Consolas,monospace" text-anchor="start">~$0.018</text>
<text x="440" y="68" font-size="8" fill="#94a3b8" text-anchor="start">Access</text><text x="440" y="86" font-size="12" font-weight="700" fill="#1e293b" text-anchor="start">Instant</text>
<text x="580" y="78" font-size="10" fill="#6b7280" text-anchor="start">Default for new data; active analytical queries</text>

<rect x="20" y="132" width="880" height="68" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<rect x="35" y="144" width="85" height="26" rx="13" fill="#2563eb"/><text x="77" y="162" font-size="12" font-weight="700" fill="white" text-anchor="middle">COOL</text>
<text x="140" y="156" font-size="11" font-weight="700" fill="#1e293b" text-anchor="start">31 days - 2 years</text>
<text x="300" y="148" font-size="8" fill="#94a3b8" text-anchor="start">Cost/GB/mo</text><text x="300" y="166" font-size="15" font-weight="700" fill="#2563eb" font-family="Consolas,monospace" text-anchor="start">~$0.010</text>
<text x="440" y="148" font-size="8" fill="#94a3b8" text-anchor="start">Access</text><text x="440" y="166" font-size="12" font-weight="700" fill="#1e293b" text-anchor="start">Instant</text>
<text x="580" y="158" font-size="10" fill="#6b7280" text-anchor="start">90 days no query activity (telemetry-driven)</text>

<rect x="20" y="212" width="880" height="68" rx="8" fill="#eef2ff" stroke="#6366f1"/>
<rect x="35" y="224" width="85" height="26" rx="13" fill="#6366f1"/><text x="77" y="242" font-size="12" font-weight="700" fill="white" text-anchor="middle">COLD</text>
<text x="140" y="236" font-size="11" font-weight="700" fill="#1e293b" text-anchor="start">2-3 years</text>
<text x="300" y="228" font-size="8" fill="#94a3b8" text-anchor="start">Cost/GB/mo</text><text x="300" y="246" font-size="15" font-weight="700" fill="#6366f1" font-family="Consolas,monospace" text-anchor="start">~$0.004</text>
<text x="440" y="228" font-size="8" fill="#94a3b8" text-anchor="start">Access</text><text x="440" y="246" font-size="12" font-weight="700" fill="#1e293b" text-anchor="start">Instant</text>
<text x="580" y="238" font-size="10" fill="#6b7280" text-anchor="start">Extended no-query; 90-day early deletion penalty</text>

<!-- DELETE endpoint instead of Archive -->
<rect x="20" y="292" width="880" height="78" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<rect x="35" y="306" width="85" height="26" rx="13" fill="#dc2626"/><text x="77" y="324" font-size="11" font-weight="700" fill="white" text-anchor="middle">DELETE</text>
<text x="140" y="318" font-size="11" font-weight="700" fill="#dc2626" text-anchor="start">After 2-3 years</text>
<text x="300" y="310" font-size="8" fill="#94a3b8" text-anchor="start">Cost/GB/mo</text><text x="300" y="328" font-size="15" font-weight="700" fill="#dc2626" font-family="Consolas,monospace" text-anchor="start">$0.000</text>
<text x="440" y="310" font-size="8" fill="#94a3b8" text-anchor="start">Recovery</text><text x="440" y="328" font-size="12" font-weight="700" fill="#1e293b" text-anchor="start">Rebuild from vault</text>
<text x="580" y="310" font-size="10" fill="#dc2626" font-weight="700" text-anchor="start">No double-archive. Vault holds the permanent copy.</text>
<text x="580" y="328" font-size="9" fill="#6b7280" text-anchor="start">If new analytical need arises, replay from vault into new Bronze.</text>
<text x="140" y="354" font-size="9" fill="#94a3b8" text-anchor="start">Exception: high-value Bronze snapshots where re-derivation from vault is expensive may be retained at Cold tier with explicit justification.</text>

<!-- Lifecycle gate -->
<rect x="20" y="388" width="880" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
<text x="40" y="410" font-size="10" font-weight="700" fill="#16a34a" text-anchor="start">LIFECYCLE GATE — All must be TRUE before tier-down or delete</text>
<text x="55" y="432" font-size="10" fill="#16a34a" font-family="Consolas,monospace" text-anchor="start">✓</text><text x="70" y="432" font-size="10" fill="#6b7280" text-anchor="start">No active Gold/MV dependency</text>
<text x="55" y="450" font-size="10" fill="#16a34a" font-family="Consolas,monospace" text-anchor="start">✓</text><text x="70" y="450" font-size="10" fill="#6b7280" text-anchor="start">Rebuild path from vault verified</text>
<text x="470" y="432" font-size="10" fill="#16a34a" font-family="Consolas,monospace" text-anchor="start">✓</text><text x="486" y="432" font-size="10" fill="#6b7280" text-anchor="start">No legal hold</text>
<text x="470" y="450" font-size="10" fill="#16a34a" font-family="Consolas,monospace" text-anchor="start">✓</text><text x="486" y="450" font-size="10" fill="#6b7280" text-anchor="start">No open DSR/exit case</text>

<!-- Stream 1 comparison -->
<rect x="20" y="488" width="880" height="135" rx="8" fill="#fefce8" stroke="#b45309"/>
<text x="40" y="510" font-size="11" font-weight="700" fill="#b45309" text-anchor="start">STREAM 1 — COMPLIANCE VAULT — Creation-Date Tiering (Accelerated) — This is the permanent copy</text>
<text x="40" y="528" font-size="9" fill="#94a3b8" text-anchor="start">Vault data is never queried by Databricks — tiering is purely time-based, maximally aggressive to minimize cost</text>

<text x="55" y="552" font-size="10" fill="#6b7280" font-family="Consolas,monospace" text-anchor="start">Days 0-7     Hot       $0.018    (Azure default write tier — brief)</text>
<text x="55" y="568" font-size="10" fill="#6b7280" font-family="Consolas,monospace" text-anchor="start">Days 7-30    Cool      $0.010    (immediate — no query need)</text>
<text x="55" y="584" font-size="10" fill="#6b7280" font-family="Consolas,monospace" text-anchor="start">Days 30-90   Cold      $0.004    (still instant-access for replay if needed)</text>
<text x="55" y="600" font-size="10" fill="#b45309" font-family="Consolas,monospace" font-weight="700" text-anchor="start">Day 90+      Archive   $0.001    (15hr rehydration — acceptable for legal/rebuild)</text>
<text x="55" y="618" font-size="9" fill="#b45309" text-anchor="start">Auto-destroys at 10-year retention expiry. Until then: immutable, tamper-proof, and very cheap.</text>
</svg>