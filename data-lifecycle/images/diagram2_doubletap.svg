<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 590" width="920" height="590">
<rect width="920" height="590" fill="#ffffff" rx="4"/>
<style>text{font-family:Segoe UI,Arial,sans-serif}</style>
<defs>
<marker id="a1" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/></marker>
<marker id="a2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#b45309"/></marker>
<marker id="a3" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#0369a1"/></marker>
</defs>

<rect x="320" y="10" width="280" height="38" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
<text x="460" y="28" font-size="11" fill="#64748b" text-anchor="middle">CDC EVENT / KAFKA MESSAGE</text>
<text x="460" y="42" font-size="9" fill="#94a3b8" text-anchor="middle">from source database or event stream</text>
<line x1="460" y1="48" x2="460" y2="68" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

<circle cx="460" cy="88" r="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="460" y="84" font-size="8" font-weight="700" fill="#2563eb" text-anchor="middle">FORK</text>
<text x="460" y="96" font-size="8" font-weight="700" fill="#2563eb" text-anchor="middle">POINT</text>
<text x="460" y="126" font-size="9" fill="#94a3b8" text-anchor="middle">100% of payload goes to BOTH streams</text>

<line x1="436" y1="88" x2="185" y2="88" stroke="#b45309" stroke-width="2"/>
<line x1="185" y1="88" x2="185" y2="148" stroke="#b45309" stroke-width="2" marker-end="url(#a2)"/>
<line x1="484" y1="88" x2="690" y2="88" stroke="#0369a1" stroke-width="2"/>
<line x1="690" y1="88" x2="690" y2="148" stroke="#0369a1" stroke-width="2" marker-end="url(#a3)"/>

<!-- Stream 1: Permanent Archive -->
<rect x="40" y="150" width="290" height="405" rx="10" fill="#fefce8" stroke="#b45309"/>
<text x="60" y="175" font-size="13" font-weight="700" fill="#b45309" text-anchor="start">STREAM 1: Permanent Archive</text>
<text x="60" y="192" font-size="10" fill="#b45309" text-anchor="start">The only long-term copy</text>
<line x1="60" y1="202" x2="310" y2="202" stroke="#d97706" stroke-width="0.5"/>

<text x="60" y="222" font-size="10" font-weight="700" fill="#1e293b" text-anchor="start">ADLS Gen2 WORM Immutable</text>
<text x="60" y="240" font-size="9" fill="#6b7280" text-anchor="start">100% of every CDC payload</text>
<text x="60" y="256" font-size="9" fill="#6b7280" text-anchor="start">10-year locked retention</text>
<text x="60" y="272" font-size="9" fill="#6b7280" text-anchor="start">Tamper-proof chain of custody</text>

<line x1="60" y1="286" x2="310" y2="286" stroke="#d97706" stroke-width="0.5"/>
<text x="60" y="306" font-size="10" font-weight="700" fill="#1e293b" text-anchor="start">Accelerated Tiering</text>
<text x="60" y="324" font-size="9" fill="#6b7280" text-anchor="start">No query need = aggressive cost reduction</text>
<text x="60" y="345" font-size="9" fill="#6b7280" font-family="Consolas,monospace" text-anchor="start">Days 0-7    Hot      ~$0.018/GB</text>
<text x="60" y="361" font-size="9" fill="#6b7280" font-family="Consolas,monospace" text-anchor="start">Days 7-30   Cool     ~$0.010/GB</text>
<text x="60" y="377" font-size="9" fill="#6b7280" font-family="Consolas,monospace" text-anchor="start">Days 30-90  Cold     ~$0.004/GB</text>
<text x="60" y="393" font-size="9" fill="#b45309" font-family="Consolas,monospace" font-weight="700" text-anchor="start">Day 90+     Archive  ~$0.001/GB</text>

<line x1="60" y1="410" x2="310" y2="410" stroke="#d97706" stroke-width="0.5"/>
<text x="60" y="430" font-size="10" font-weight="700" fill="#1e293b" text-anchor="start">Purpose</text>
<text x="60" y="450" font-size="9" fill="#b45309" text-anchor="start">Legal survival and rebuild source</text>
<text x="60" y="466" font-size="9" fill="#6b7280" text-anchor="start">Azure Functions / Event Hubs Capture</text>
<text x="60" y="482" font-size="9" fill="#6b7280" text-anchor="start">Never touches Databricks compute</text>

<rect x="55" y="498" width="260" height="42" rx="4" fill="#fef3c7" stroke="#d97706"/>
<text x="185" y="515" font-size="9" font-weight="700" fill="#b45309" text-anchor="middle">5PB Archive = ~$5K/mo vs $90K/mo Hot</text>
<text x="185" y="530" font-size="8" fill="#92711a" text-anchor="middle">This is the ONLY long-term storage cost</text>

<!-- Stream 2: Disposable Working Copy -->
<rect x="545" y="150" width="340" height="405" rx="10" fill="#eff6ff" stroke="#0369a1"/>
<text x="565" y="175" font-size="13" font-weight="700" fill="#0369a1" text-anchor="start">STREAM 2: Disposable Working Copy</text>
<text x="565" y="192" font-size="10" fill="#0369a1" text-anchor="start">Queryable then deleted (not archived)</text>
<line x1="565" y1="202" x2="865" y2="202" stroke="#2563eb" stroke-width="0.5"/>

<rect x="565" y="214" width="300" height="42" rx="5" fill="#fef2f2" stroke="#dc2626"/>
<text x="575" y="232" font-size="11" font-weight="700" fill="#dc2626" text-anchor="start">Landing</text>
<text x="575" y="248" font-size="8" fill="#6b7280" text-anchor="start">30-90d · Parse, type, source metadata · Drop after checkpoint</text>

<rect x="565" y="268" width="300" height="56" rx="5" fill="#fefce8" stroke="#b45309"/>
<text x="575" y="286" font-size="11" font-weight="700" fill="#b45309" text-anchor="start">Bronze — 100% payload in Delta</text>
<text x="575" y="302" font-size="8" fill="#6b7280" text-anchor="start">Hot 30d → Cool at 90d no-query</text>
<text x="575" y="314" font-size="8" fill="#dc2626" font-weight="700" text-anchor="start">DELETE after 2-3 years — vault holds the permanent copy</text>

<rect x="565" y="336" width="300" height="42" rx="5" fill="#eff6ff" stroke="#2563eb"/>
<text x="575" y="354" font-size="11" font-weight="700" fill="#2563eb" text-anchor="start">Silver — Promoted on demand</text>
<text x="575" y="370" font-size="8" fill="#6b7280" text-anchor="start">Drop when unused · Rebuild from Bronze or vault</text>

<rect x="565" y="390" width="300" height="42" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
<text x="575" y="408" font-size="11" font-weight="700" fill="#16a34a" text-anchor="start">Gold — Built from Silver</text>
<text x="575" y="424" font-size="8" fill="#6b7280" text-anchor="start">Drop when unused · Rebuildable · BI-facing</text>

<line x1="565" y1="445" x2="865" y2="445" stroke="#2563eb" stroke-width="0.5"/>
<text x="565" y="465" font-size="10" font-weight="700" fill="#1e293b" text-anchor="start">Ownership</text>
<text x="565" y="483" font-size="9" fill="#6b7280" text-anchor="start">Bronze owner: DE Modernization Leader (domain)</text>
<text x="565" y="499" font-size="9" fill="#6b7280" text-anchor="start">Silver/Gold owner: Operational DE + Analytics partner</text>

<rect x="560" y="514" width="310" height="28" rx="4" fill="#fef2f2" stroke="#dc2626"/>
<text x="715" y="533" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle">No double-archive: all medallion data is disposable</text>

<text x="460" y="578" font-size="9" fill="#94a3b8" text-anchor="middle">Vault = permanent (10yr) · Medallion = disposable (2-3yr queryable then delete) · No data stored twice at Archive tier</text>
</svg>