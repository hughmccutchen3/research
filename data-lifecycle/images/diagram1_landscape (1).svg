<!-- Footer -->
<rect x="15" y="400" width="888" height="115" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="0.8"/>
<text x="35" y="420" font-size="10" font-weight="700" fill="#dc2626" text-anchor="start">KEY COMPLEXITIES</text>
<text x="35" y="438" font-size="9" fill="#6b7280" text-anchor="start">[KC-01] Hundreds of source DBs across legal entities            [KC-02] Multi-customer data on same record</text>
<text x="35" y="454" font-size="9" fill="#6b7280" text-anchor="start">[KC-03] No enterprise patient/physician key                         [KC-04] Patients/physicians are facts on records</text>
<text x="35" y="470" font-size="9" fill="#6b7280" text-anchor="start">[KC-05] Source apps retain only 12-24 months                         [KC-06] 5+ yrs failed inventory   [KC-07] Entity model early</text>
<text x="35" y="490" font-size="9" fill="#b45309" text-anchor="start">[KC-08] "Customer" is polymorphic: payer, pharmacy, or EHR system. Each has different data footprint across the lake.</text>
