<!-- Stream 1 -->
<rect x="330" y="50" width="385" height="105" rx="8" fill="#fefce8" stroke="#b45309"/>
<text x="345" y="72" font-size="12" font-weight="700" fill="#b45309" text-anchor="start">STREAM 1: Compliance Vault (Permanent Archive)</text>
<text x="345" y="90" font-size="10" fill="#6b7280" text-anchor="start">ADLS Gen2 WORM — 10yr retention — Accelerated to Archive by day 90</text>
<text x="345" y="110" font-size="10" fill="#b45309" font-family="Consolas,monospace" text-anchor="start">Hot(7d) → Cool(30d) → Cold(90d) → Archive(10yr)</text>
<text x="345" y="130" font-size="9" fill="#94a3b8" text-anchor="start">100% of payload · Never touches Databricks · This is the permanent copy</text>

<!-- Stream 2 -->
<rect x="330" y="175" width="385" height="195" rx="8" fill="#eff6ff" stroke="#0369a1"/>
<text x="345" y="197" font-size="12" font-weight="700" fill="#0369a1" text-anchor="start">STREAM 2: Analytical Lake (Disposable Working Copy)</text>
<text x="345" y="214" font-size="10" fill="#6b7280" text-anchor="start">Delta Lake / Unity Catalog — Queryable 2-3 years then deleted</text>

<rect x="350" y="225" width="78" height="24" rx="4" fill="#fef2f2" stroke="#dc2626"/>
<text x="389" y="242" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">Landing</text>
<rect x="440" y="225" width="78" height="24" rx="4" fill="#fefce8" stroke="#b45309"/>
<text x="479" y="242" font-size="10" font-weight="700" fill="#b45309" text-anchor="middle">Bronze</text>
<rect x="530" y="225" width="68" height="24" rx="4" fill="#eff6ff" stroke="#2563eb"/>
<text x="564" y="242" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">Silver</text>
<rect x="610" y="225" width="56" height="24" rx="4" fill="#f0fdf4" stroke="#16a34a"/>
<text x="638" y="242" font-size="10" font-weight="700" fill="#16a34a" text-anchor="middle">Gold</text>

<text x="345" y="275" font-size="9" fill="#6b7280" text-anchor="start">Bronze: Hot 30d → Cool → DELETE after 2-3 yrs (vault holds permanent copy)</text>
<text x="345" y="291" font-size="9" fill="#6b7280" text-anchor="start">Silver/Gold: promoted on demand, dropped when unused (rebuildable)</text>
<text x="345" y="307" font-size="9" fill="#6b7280" text-anchor="start">Promotion is demand-driven, not ingestion-time</text>

<rect x="345" y="320" width="360" height="22" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="0.8"/>
<text x="525" y="336" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle">No double-archive: vault is the permanent copy, Bronze is the working copy</text>

