<!-- ─── FOOTER NOTE  (3 lines, all checked for overflow) ─────────── -->
<text font-size="10" font-weight="400" font-family="Arial, sans-serif"
      x="410" y="456" text-anchor="middle" fill="#5A6878">Inverse pattern: pharma access decreases as physician intent increases.</text>
<text font-size="10" font-weight="400" font-family="Arial, sans-serif"
      x="410" y="471" text-anchor="middle" fill="#5A6878">Pharma entry point is the advertising model — ad-supported platforms at Tier 2–3 accept sponsorship.</text>
<text font-size="10" font-weight="400" font-family="Arial, sans-serif"
      x="410" y="486" text-anchor="middle" fill="#5A6878">UpToDate is the structural exception: subscription-only, zero pharma access.</text>

