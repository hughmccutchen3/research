<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0,10 4,0 8" fill="#2d6eaa"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0,10 4,0 8" fill="#5b3d9e"/>
    </marker>
    <marker id="arr-purple-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5b3d9e"/>
    </marker>
    <marker id="arr-bidir-end" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5a3e00"/>
    </marker>
    <marker id="arr-bidir-start" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0,0 3,8 6" fill="#5a3e00"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="490" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a3a5c">Verification &#x2014; how findings earn confidence before they leave the desk</text>
  <text x="490" y="52" text-anchor="middle" font-size="11" font-weight="400" fill="#4a5568" font-style="italic">Three sections of work &#x2014; collect, analyze, refine &#x2014; run as a loop until findings earn confidence.</text>
  <text x="490" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3e00" font-style="italic">Iterative, not linear.</text>

  <!-- ============ SECTION 1: COLLECT ============ -->
  <text x="32" y="92" font-size="13" font-weight="700" fill="#1a3a5c">COLLECT</text>
  <text x="98" y="92" font-size="10" font-weight="400" fill="#4a5568" font-style="italic">&#x2014; research sources triangulate</text>
  <line x1="20" y1="98" x2="960" y2="98" stroke="#2d6eaa" stroke-width="0.8" opacity="0.5"/>

  <!-- Sources parent box -->
  <rect x="180" y="106" width="400" height="86" rx="8" fill="#f0f4f8" stroke="#2d5270" stroke-width="1.5"/>

  <!-- Source 1: Public web -->
  <rect x="192" y="114" width="118" height="70" rx="6" fill="#dce8f5" stroke="#2d6eaa" stroke-width="1.2"/>
  <text x="251" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a5c">Public web</text>
  <text x="251" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a5c">sources</text>
  <text x="251" y="166" text-anchor="middle" font-size="9" font-weight="400" fill="#2c4a6e" font-style="italic">Quick lookup to</text>
  <text x="251" y="178" text-anchor="middle" font-size="9" font-weight="400" fill="#2c4a6e" font-style="italic">deep research</text>

  <!-- Source 2: Academic corpus -->
  <rect x="321" y="114" width="118" height="70" rx="6" fill="#dce8f5" stroke="#2d6eaa" stroke-width="1.2"/>
  <text x="380" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a5c">Academic</text>
  <text x="380" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a5c">corpus</text>
  <text x="380" y="166" text-anchor="middle" font-size="9" font-weight="400" fill="#2c4a6e" font-style="italic">Peer-reviewed,</text>
  <text x="380" y="178" text-anchor="middle" font-size="9" font-weight="400" fill="#2c4a6e" font-style="italic">citation-locked</text>

  <!-- Source 3: Customer library -->
  <rect x="450" y="114" width="118" height="70" rx="6" fill="#dce8f5" stroke="#2d6eaa" stroke-width="1.2"/>
  <text x="509" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a5c">Customer</text>
  <text x="509" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a5c">library</text>
  <text x="509" y="166" text-anchor="middle" font-size="9" font-weight="400" fill="#2c4a6e" font-style="italic">Proprietary,</text>
  <text x="509" y="178" text-anchor="middle" font-size="9" font-weight="400" fill="#2c4a6e" font-style="italic">firewalled</text>

  <!-- Starts-in-the-platform note (open item 2): the method sets up the method -->
  <rect x="600" y="112" width="352" height="74" rx="8" fill="#eef3f8" stroke="#2d5270" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="616" y="132" font-size="10" font-weight="700" fill="#1a3a5c">Before collection begins</text>
  <text x="616" y="150" font-size="9" fill="#2c4a6e">The problem statement and the first collection</text>
  <text x="616" y="163" font-size="9" fill="#2c4a6e">prompts are built in the platform first — the same</text>
  <text x="616" y="176" font-size="9" fill="#2c4a6e">collect &#xB7; analyze &#xB7; refine pattern, in miniature.</text>

  <!-- Single simplified arrow: COLLECT → ANALYZE -->
  <line x1="380" y1="196" x2="380" y2="222" stroke="#2d6eaa" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- ============ SECTION 2: ANALYZE ============ -->
  <text x="32" y="248" font-size="13" font-weight="700" fill="#2e1060">ANALYZE</text>
  <text x="102" y="248" font-size="10" font-weight="400" fill="#4a5568" font-style="italic">&#x2014; synthesize, arbitrate, and sanity-check with the customer</text>
  <line x1="20" y1="254" x2="960" y2="254" stroke="#5b3d9e" stroke-width="0.8" opacity="0.5"/>

  <!-- Grouped background for ANALYZE -->
  <rect x="180" y="262" width="700" height="130" rx="8" fill="#f6f2fa" stroke="#5b3d9e" stroke-width="0.8" opacity="0.9"/>

  <!-- Synthesize & compare -->
  <rect x="192" y="272" width="376" height="46" rx="6" fill="#e8eef4" stroke="#1e3a52" stroke-width="1.5"/>
  <text x="380" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#0f2535">Synthesize &amp; compare for consistency</text>
  <text x="380" y="308" text-anchor="middle" font-size="9" font-weight="400" fill="#1e293b">Where do the sources agree? Where do they diverge? What did none return?</text>

  <!-- Small internal arrow -->
  <line x1="380" y1="318" x2="380" y2="336" stroke="#5b3d9e" stroke-width="1.5" marker-end="url(#arr-purple-sm)"/>

  <!-- Analyst arbitration -->
  <rect x="192" y="338" width="376" height="46" rx="6" fill="#e8e0f5" stroke="#5b3d9e" stroke-width="1.5"/>
  <text x="380" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#2e1060">Analyst-in-the-loop arbitration</text>
  <text x="380" y="374" text-anchor="middle" font-size="9" font-weight="400" fill="#4a2d8a">Names what is agreed, what is contested, what is not found. Decides the next move.</text>

  <!-- Customer feedback (adjacent to arbitration, inside ANALYZE group) -->
  <rect x="620" y="338" width="248" height="46" rx="6" fill="#fdf6e3" stroke="#b8860b" stroke-width="1.5"/>
  <text x="744" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3e00">The customer</text>
  <text x="744" y="374" text-anchor="middle" font-size="9" font-weight="400" fill="#5a3e00">Reactions, reality check, missed context</text>

  <!-- Bidirectional arrow between arbitration and customer -->
  <line x1="570" y1="361" x2="620" y2="361" stroke="#5a3e00" stroke-width="1.6" marker-start="url(#arr-bidir-start)" marker-end="url(#arr-bidir-end)"/>
  <text x="595" y="354" text-anchor="middle" font-size="8" font-weight="700" fill="#5a3e00" font-style="italic">human-to-human</text>
  <text x="595" y="376" text-anchor="middle" font-size="8" font-weight="700" fill="#5a3e00" font-style="italic">review loop</text>

  <!-- Single simplified arrow: ANALYZE → REFINE -->
  <line x1="380" y1="396" x2="380" y2="422" stroke="#5b3d9e" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ============ SECTION 3: REFINE ============ -->
  <text x="32" y="448" font-size="13" font-weight="700" fill="#5a3e00">REFINE</text>
  <text x="94" y="448" font-size="10" font-weight="400" fill="#4a5568" font-style="italic">&#x2014; review gaps, define the next pull</text>
  <line x1="20" y1="454" x2="960" y2="454" stroke="#b8860b" stroke-width="0.8" opacity="0.5"/>

  <!-- Grouped background for REFINE -->
  <rect x="180" y="462" width="700" height="82" rx="8" fill="#fdfaef" stroke="#b8860b" stroke-width="0.8" opacity="0.9"/>

  <!-- Review box -->
  <rect x="192" y="470" width="200" height="66" rx="6" fill="#ffffff" stroke="#5b3d9e" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="292" y="488" text-anchor="middle" font-size="10" font-weight="700" fill="#2e1060">Review weaknesses and prioritize</text>
  <text x="204" y="506" font-size="8.5" font-weight="400" fill="#4a2d8a">&#xB7; Where evidence is thin</text>
  <text x="204" y="518" font-size="8.5" font-weight="400" fill="#4a2d8a">&#xB7; What no source returned</text>
  <text x="204" y="530" font-size="8.5" font-weight="400" fill="#4a2d8a">&#xB7; Order by impact on goal</text>

  <!-- Horizontal arrow: Review → Refine -->
  <line x1="392" y1="503" x2="418" y2="503" stroke="#5b3d9e" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Define refinement box -->
  <rect x="418" y="470" width="200" height="66" rx="6" fill="#ffffff" stroke="#5b3d9e" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="518" y="488" text-anchor="middle" font-size="10" font-weight="700" fill="#2e1060">Define refinement strategy</text>
  <text x="430" y="506" font-size="8.5" font-weight="400" fill="#4a2d8a">&#xB7; Which refinement needed</text>
  <text x="430" y="518" font-size="8.5" font-weight="400" fill="#4a2d8a">&#xB7; Best source for this gap</text>
  <text x="430" y="530" font-size="8.5" font-weight="400" fill="#4a2d8a">&#xB7; Prompt or query approach</text>

  <!-- Backflow: REFINE → COLLECT (secondary flow, routed up the left gutter, fatter dash) -->
  <path d="M 192 503 L 14 503 L 14 149 L 176 149" fill="none" stroke="#5b3d9e" stroke-width="2.6" stroke-dasharray="10,6" opacity="0.85" marker-end="url(#arr-purple)"/>
  <text x="30" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#4a2d8a" font-style="italic" transform="rotate(-90 30 330)">iterate &#xB7; re-pull</text>

  <!-- Unresolved callout (right of REFINE section) -->
  <text x="490" y="562" text-anchor="middle" font-size="9" font-weight="400" fill="#4a5568" font-style="italic">When a gap cannot be closed, it is named as unresolved and flagged in the deliverable.</text>
</svg>
