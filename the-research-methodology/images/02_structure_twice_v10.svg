<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2d6eaa"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1020" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="490" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a3a5c">Structure applied twice &#x2014; how research becomes work, then how work becomes narrative</text>
  <text x="490" y="52" text-anchor="middle" font-size="11" font-weight="400" fill="#4a5568" font-style="italic">The same three-part discipline runs twice: once to build the dataset (Layer 1), once to build the customer-specific output (Layer 2). The problem statement anchors both.</text>

  <!-- THE PROBLEM STATEMENT (aligned with Diagram 01) -->
  <rect x="20" y="76" width="940" height="66" rx="8" fill="#f7ede0" stroke="#8b6a3b" stroke-width="1.5"/>
  <text x="36" y="102" font-size="12" font-weight="700" fill="#5a3e00">THE PROBLEM STATEMENT</text>
  <text x="36" y="122" font-size="10" font-weight="400" fill="#5a3e00">The shared understanding of the work &#x2014; its goal, domain, scope, sources, and open questions. See Diagram 1 for its parts.</text>
  <text x="36" y="136" font-size="10" font-weight="400" fill="#5a3e00">Both layers below serve it. Layer 1 builds the shared understanding of the domain; Layer 2 turns that into the insights the customer needs.</text>

  <!-- LAYER 1 -->
  <rect x="20" y="160" width="940" height="30" rx="6" fill="#2a7a50"/>
  <text x="40" y="180" font-size="12" font-weight="700" fill="#ffffff">LAYER 1 &#x2014; FOUNDATIONAL RESEARCH</text>
  <text x="480" y="180" font-size="10" font-weight="400" fill="#ddf0e8" font-style="italic">Data shaped for the fullest understanding of each domain. Ready for many analyses.</text>

  <!-- L1 Col 1 -->
  <rect x="20" y="200" width="300" height="200" rx="6" fill="#ddf0e8" stroke="#2a7a50" stroke-width="1.5"/>
  <rect x="20" y="200" width="300" height="34" rx="6" fill="#2a7a50"/>
  <rect x="20" y="222" width="300" height="12" fill="#2a7a50"/>
  <text x="170" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">GOAL FOR UNDERSTANDING</text>
  <text x="36" y="258" font-size="10" font-weight="700" fill="#133d26">What do we need to understand about</text>
  <text x="36" y="272" font-size="10" font-weight="700" fill="#133d26">this part of the domain?</text>
  <line x1="36" y1="286" x2="304" y2="286" stroke="#2a7a50" stroke-width="0.5" opacity="0.5"/>
  <text x="36" y="306" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; What we need a full understanding of</text>
  <text x="36" y="322" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; A goal is better than a question</text>
  <text x="36" y="338" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; Framed against the problem statement above</text>
  <text x="36" y="354" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; Identify shared dimensions across domains</text>
  <text x="36" y="378" font-size="9" font-style="italic" fill="#1e5c38">Example shape:</text>
  <text x="36" y="392" font-size="9" font-style="italic" fill="#1e5c38">&#x201C;Understand how X operates in a specific dimension.&#x201D;</text>

  <!-- L1 Col 2 -->
  <rect x="340" y="200" width="300" height="200" rx="6" fill="#ddf0e8" stroke="#2a7a50" stroke-width="1.5"/>
  <rect x="340" y="200" width="300" height="34" rx="6" fill="#2a7a50"/>
  <rect x="340" y="222" width="300" height="12" fill="#2a7a50"/>
  <text x="490" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">DIMENSIONS TO EXPLORE</text>
  <text x="356" y="258" font-size="10" font-weight="700" fill="#133d26">What are the dimensions along which</text>
  <text x="356" y="272" font-size="10" font-weight="700" fill="#133d26">this can be organized?</text>
  <line x1="356" y1="286" x2="624" y2="286" stroke="#2a7a50" stroke-width="0.5" opacity="0.5"/>
  <text x="356" y="306" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; Types &#xB7; players &#xB7; mechanisms &#xB7; outcomes</text>
  <text x="356" y="322" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; Time bounds &#xB7; source types</text>
  <text x="356" y="338" font-size="9.5" font-weight="400" fill="#1e5c38">&#xB7; Set the shape before pulling any data</text>
  <text x="356" y="378" font-size="9" font-style="italic" fill="#1e5c38">Sub-questions come later &#x2014; naming them</text>
  <text x="356" y="392" font-size="9" font-style="italic" fill="#1e5c38">too early narrows the pull.</text>

  <!-- L1 Col 3 -->
  <rect x="660" y="200" width="300" height="200" rx="6" fill="#ddf0e8" stroke="#2a7a50" stroke-width="1.5"/>
  <rect x="660" y="200" width="300" height="34" rx="6" fill="#2a7a50"/>
  <rect x="660" y="222" width="300" height="12" fill="#2a7a50"/>
  <text x="810" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">COLLECT &#xB7; SYNTHESIZE &#xB7; VALIDATE</text>
  <text x="676" y="258" font-size="10" font-weight="700" fill="#133d26">What evidence do we build,</text>
  <text x="676" y="272" font-size="10" font-weight="700" fill="#133d26">and how?</text>
  <line x1="676" y1="286" x2="944" y2="286" stroke="#2a7a50" stroke-width="0.5" opacity="0.5"/>
  <text x="676" y="306" font-size="9.5" font-weight="400" fill="#1e5c38">Per part, evidence is collected, reconciled,</text>
  <text x="676" y="322" font-size="9.5" font-weight="400" fill="#1e5c38">and validated by analyst, platform, and</text>
  <text x="676" y="338" font-size="9.5" font-weight="400" fill="#1e5c38">customer. Early insights surface; further</text>
  <text x="676" y="354" font-size="9.5" font-weight="400" fill="#1e5c38">questions and data needs identified. (Diagram 3)</text>

  <!-- HAND-OFF -->
  <line x1="490" y1="410" x2="490" y2="436" stroke="#666" stroke-width="2" marker-end="url(#arr-gray)"/>
  <rect x="220" y="410" width="540" height="30" rx="4" fill="#f5f5f0" stroke="#8a7660" stroke-width="1"/>
  <text x="490" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#5a3e00">The dataset from Layer 1 becomes the input to Layer 2 &#x2014; the pattern repeats, the emphasis shifts.</text>

  <!-- LAYER 2 -->
  <rect x="20" y="452" width="940" height="30" rx="6" fill="#2d6eaa"/>
  <text x="40" y="472" font-size="12" font-weight="700" fill="#ffffff">LAYER 2 &#x2014; FINAL ANALYSIS &amp; NARRATIVE</text>
  <text x="480" y="472" font-size="10" font-weight="400" fill="#dce8f5" font-style="italic">Build the customer-specific output. Customer questions shape what to look for in the data.</text>

  <!-- L2 Col 1 -->
  <rect x="20" y="492" width="300" height="200" rx="6" fill="#dce8f5" stroke="#2d6eaa" stroke-width="1.5"/>
  <rect x="20" y="492" width="300" height="34" rx="6" fill="#2d6eaa"/>
  <rect x="20" y="514" width="300" height="12" fill="#2d6eaa"/>
  <text x="170" y="514" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">GOAL FOR UNDERSTANDING</text>
  <text x="36" y="550" font-size="10" font-weight="700" fill="#1a3a5c">What does the customer need</text>
  <text x="36" y="564" font-size="10" font-weight="700" fill="#1a3a5c">to understand to decide or act?</text>
  <line x1="36" y1="578" x2="304" y2="578" stroke="#2d6eaa" stroke-width="0.5" opacity="0.5"/>
  <text x="36" y="598" font-size="9.5" font-weight="400" fill="#2c4a6e">&#xB7; Customer-specific; anchored in the problem statement</text>
  <text x="36" y="614" font-size="9.5" font-weight="400" fill="#2c4a6e">&#xB7; Their questions shape what to look for</text>
  <text x="36" y="630" font-size="9.5" font-weight="400" fill="#2c4a6e">&#xB7; Still a goal, not a question list</text>
  <text x="36" y="660" font-size="9" font-style="italic" fill="#2c4a6e">Example shape:</text>
  <text x="36" y="676" font-size="9" font-style="italic" fill="#2c4a6e">&#x201C;Understand X&#x2019;s implications for this plan.&#x201D;</text>

  <!-- L2 Col 2 -->
  <rect x="340" y="492" width="300" height="200" rx="6" fill="#dce8f5" stroke="#2d6eaa" stroke-width="1.5"/>
  <rect x="340" y="492" width="300" height="34" rx="6" fill="#2d6eaa"/>
  <rect x="340" y="514" width="300" height="12" fill="#2d6eaa"/>
  <text x="490" y="514" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">DIMENSIONS TO EXPLORE</text>
  <text x="356" y="550" font-size="10" font-weight="700" fill="#1a3a5c">What are the analytical dimensions</text>
  <text x="356" y="564" font-size="10" font-weight="700" fill="#1a3a5c">to work through the data?</text>
  <line x1="356" y1="578" x2="624" y2="578" stroke="#2d6eaa" stroke-width="0.5" opacity="0.5"/>
  <text x="356" y="598" font-size="9.5" font-weight="400" fill="#2c4a6e">&#xB7; Fit &#xB7; tension &#xB7; risk</text>
  <text x="356" y="614" font-size="9.5" font-weight="400" fill="#2c4a6e">&#xB7; Positioning &#xB7; recommendation shape</text>
  <text x="356" y="630" font-size="9.5" font-weight="400" fill="#2c4a6e">&#xB7; Not sub-questions &#x2014; analytical dimensions</text>
  <text x="356" y="660" font-size="9" font-style="italic" fill="#2c4a6e">Customer questions get folded into the</text>
  <text x="356" y="676" font-size="9" font-style="italic" fill="#2c4a6e">dimensions here, not into the goal above.</text>

  <!-- L2 Col 3 -->
  <rect x="660" y="492" width="300" height="200" rx="6" fill="#dce8f5" stroke="#2d6eaa" stroke-width="1.5"/>
  <rect x="660" y="492" width="300" height="34" rx="6" fill="#2d6eaa"/>
  <rect x="660" y="514" width="300" height="12" fill="#2d6eaa"/>
  <text x="810" y="514" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">ANALYSIS &amp; NARRATIVE</text>
  <text x="676" y="550" font-size="10" font-weight="700" fill="#1a3a5c">What analysis do we build,</text>
  <text x="676" y="564" font-size="10" font-weight="700" fill="#1a3a5c">and how?</text>
  <line x1="676" y1="578" x2="944" y2="578" stroke="#2d6eaa" stroke-width="0.5" opacity="0.5"/>
  <text x="676" y="598" font-size="9.5" font-weight="400" fill="#2c4a6e">Across parts above, the analyst develops</text>
  <text x="676" y="614" font-size="9.5" font-weight="400" fill="#2c4a6e">insights within the framework, then validates</text>
  <text x="676" y="630" font-size="9.5" font-weight="400" fill="#2c4a6e">for review and refinement with the customer</text>
  <text x="676" y="646" font-size="9.5" font-weight="400" fill="#2c4a6e">(Diagram 3).</text>
  <text x="676" y="668" font-size="9" font-style="italic" fill="#2c4a6e">Output of Layer 2: the insights the customer needs,</text>
  <text x="676" y="682" font-size="9" font-style="italic" fill="#2c4a6e">decision-shaped, with low-confidence areas flagged.</text>

  <!-- Footer callout -->
  <rect x="20" y="712" width="940" height="52" rx="6" fill="#fdf6e3" stroke="#b8860b" stroke-width="1.2"/>
  <text x="36" y="734" font-size="11" font-weight="700" fill="#5a3e00">THE PATTERN &#x2014; same three-part discipline, applied twice. Emphasis differs; shape is deliberate.</text>
  <text x="36" y="754" font-size="9" font-weight="400" fill="#5a3e00" font-style="italic">Structural artifacts like this diagram are themselves the practice &#x2014; used during the work to clarify structure, not only afterwards to communicate it.</text>

  <!-- Right-edge bracket: the two col-3 boxes are where most of the effort goes (open item 1) -->
  <path d="M 968 210 L 980 210 L 980 682 L 968 682" fill="none" stroke="#a52a2a" stroke-width="2.6"/>
  <line x1="960" y1="300" x2="980" y2="300" stroke="#a52a2a" stroke-width="2.6"/>
  <line x1="960" y1="592" x2="980" y2="592" stroke="#a52a2a" stroke-width="2.6"/>
  <text x="1000" y="446" text-anchor="middle" font-size="11" font-weight="700" fill="#a52a2a" font-style="italic" transform="rotate(-90 1000 446)">Collection and analysis &#x2014; the bulk of the effort</text>
</svg>
